<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{layouts/baseUi :: baseLayout('MindScribe - Create Post', ~{::section})}">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Post</title>
</head>

<body>
	<section>
		<main>
			<section class="auth-section">
				<div class="post-container">
					<h2>Create New Post</h2>
					<!-- Alert Message -->
					<div th:if="${success}" class="alert alert-success">
						<span th:text="${success}"></span>
					</div>
					<div th:if="${error}" class="alert alert-danger">
						<span th:text="${error}"></span>
					</div>
					<!-- End Alert Message -->
					<form th:action="@{/post/saved}" method="post"
						enctype="multipart/form-data" th:object="${post}">
						<!-- Title -->
						<div class="form-group">
							<label for="title">Post Title</label> <input type="text"
								id="title" th:field="*{title}" placeholder="Enter post title">
							<!-- Validation Error -->
							<div th:if="${#fields.hasErrors('title')}" class="error-message">
								<span th:errors="*{title}"></span>
							</div>
						</div>

						<!-- Category Dropdown -->
						<div class="form-group">
							<label for="category">Add Category</label> <select id="category"
								th:field="*{categoryId}">
								<option value="">-- Select Category --</option>
								<option th:each="cat : ${categories}" th:value="${cat.id}"
									th:text="${cat.name}"></option>
							</select>
							<div class="alert alert-danger"
								th:if="${#fields.hasErrors('categoryId')}"
								th:errors="*{categoryId}"></div>
						</div>

						<!-- File Upload -->
						<div class="form-group">
							<label for="file">Upload Image</label> <input type="file"
								id="file" name="image">
						</div>

						<!-- Short Description -->
						<div class="form-group">
							<label for="shortDescription">Short Description</label>
							<textarea id="shortDescEditor" rows="3"
								placeholder="Enter a short description..."
								th:field="*{shortDesc}"></textarea>
							<!-- Validation Error -->
							<div th:if="${#fields.hasErrors('shortDesc')}"
								class="error-message">
								<span th:errors="*{shortDesc}"></span>
							</div>
						</div>

						<!-- Content -->
						<div class="form-group">
							<label for="content">Content</label>
							<textarea id="contentEditor" rows="10"
								placeholder="Write your full post content here..."
								th:field="*{content}"></textarea>
							<!-- Validation Error -->
							<div th:if="${#fields.hasErrors('content')}"
								class="error-message">
								<span th:errors="*{content}"></span>
							</div>
						</div>

						<!-- Submit Button -->
						<button type="submit" class="btn">Publish Post</button>
					</form>
				</div>
			</section>
		</main>
	</section>
</body>

</html>
