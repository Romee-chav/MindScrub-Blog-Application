<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{layouts/adminLayout/baseUi :: baseLayout('MindScribe - Admin Category', ~{::section})}">

<head>

</head>

<body>
	<section>
		<main id="main" class="main">

			<div class="pagetitle">
				<h1>Add Categorys</h1>
				<nav>
					<ol class="breadcrumb">
						<li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">Home</a></li>
						<li class="breadcrumb-item">Forms</li>
						<li class="breadcrumb-item active">Elements</li>
					</ol>
				</nav>
			</div>
			<!-- End Page Title -->

			<section class="section">
				<div class="row">
					<div class="col-lg-12">

						<div class="card">
							<div class="card-body">
								<h5 class="card-title">Add Category Form</h5>
								<div
									class="alert alert-success bg-success text-light border-0 alert-dismissible fade show"
									role="alert" th:if="${success}">
									<span th:text="${success}"></span>
									<button type="button" class="btn-close btn-close-white"
										data-bs-dismiss="alert" aria-label="Close"></button>
								</div>

								<div
									class="alert alert-danger bg-danger text-light border-0 alert-dismissible fade show"
									role="alert" th:if="${error}">
									<span th:text="${error}"></span>
									<button type="button" class="btn-close btn-close-white"
										data-bs-dismiss="alert" aria-label="Close"></button>
								</div>
								<!-- General Form Elements -->
								<form th:action="@{/admin/savedCategory}" method="post"
									th:object="${category}">
									<div class="row mb-3">
										<label for="inputText" class="col-sm-2 col-form-label">Category
											Name</label>
										<div class="col-sm-10">
											<input type="text" th:field="*{name}" class="form-control">
											<div class="alert alert-danger alert-dismissible fade show"
												role="alert" th:if="${#fields.hasErrors('name')}">
												<span th:errors="*{name}"></span>
												<button type="button" class="btn-close"
													data-bs-dismiss="alert" aria-label="Close"></button>
											</div>
										</div>
									</div>
									<div class="row mb-3">
										<label class="col-sm-2 col-form-label">Submit Button</label>
										<div class="col-sm-10">
											<button type="submit" class="btn btn-primary">Add
												Category</button>
										</div>
									</div>
								</form>
								<!-- End General Form Elements -->

							</div>
						</div>

					</div>
				</div>
			</section>

		</main>
		<!-- End #main -->

	</section>
</body>

</html>
