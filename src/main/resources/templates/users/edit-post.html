<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{layouts/baseUi :: baseLayout('MindScribe - Edit Post', ~{::section})}">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Post</title>
</head>

<body>
  <main>
    <section class="auth-section">
      <div class="post-container">
        <h2>Edit Post</h2>
        <form>
          <!-- Title -->
          <div class="form-group">
            <label for="title">Post Title</label>
            <input type="text" id="title" placeholder="Enter post title" required>
          </div>

          <!-- Category Dropdown -->
          <div class="form-group">
            <label for="category">Add Category</label>
            <select id="category" required>
              <option value="">-- Select Category --</option>
              <option value="tech">Technology</option>
              <option value="lifestyle">Lifestyle</option>
              <option value="education">Education</option>
              <option value="health">Health</option>
              <option value="business">Business</option>
            </select>
          </div>

          <!-- File Upload -->
          <div class="form-group">
            <label for="file">Upload Image</label>
            <input type="file" id="file" accept="image/*">
          </div>

          <!-- Short Description -->
          <div class="form-group">
            <label for="shortDescription">Short Description</label>
            <textarea id="shortDescription" rows="3" placeholder="Enter a short description..." required></textarea>
          </div>

          <!-- Content -->
          <div class="form-group">
            <label for="content">Content</label>
            <textarea id="content" rows="6" placeholder="Write your full post content here..." required></textarea>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="btn">Publish Post</button>
        </form>
      </div>
    </section>
  </main>
</body>

</html>
